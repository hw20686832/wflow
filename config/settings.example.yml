# WFlow 配置文件模板
# 复制此文件为 settings.yml 并根据需要修改配置

# 应用配置
app:
  name: "wflow"
  version: "1.0.0"
  environment: "development"
  debug: true

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8888
  workers: 4
  timeout: 30

# 数据库配置
database:
  mysql:
    host: "localhost"
    port: 3306
    user: "root"
    password: ""
    database: "wflow_db"
    charset: "utf8mb4"
    pool_size: 20
    max_overflow: 10
    pool_timeout: 30
    pool_recycle: 3600

# Redis配置
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: ""
  max_connections: 50
  socket_timeout: 5
  socket_connect_timeout: 5

# 会话配置
session:
  secret_key: "your-secret-key-change-this-in-production"
  expire_hours: 24
  cookie_name: "wflow_session"
  cookie_secure: false
  cookie_httponly: true

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s [%(name)s] %(levelname)s: %(message)s"
  file:
    enabled: true
    path: "var/log/app.log"
    max_bytes: 10485760
    backup_count: 5
  console:
    enabled: true

# 工作流配置
workflow:
  default_executor: "local"
  default_type: "serialFlow"
  log_dir: "var/log/workflows"
  config_dir: "conf/workflows"
  max_retries: 3
  default_retry_interval: 5

# Celery配置
celery:
  broker_url: "redis://localhost:6379/0"
  result_backend: "redis://localhost:6379/0"
  task_result_expires: 180
  worker_concurrency: 4
  worker_prefetch_multiplier: 4
  task_acks_late: true
  worker_prefetch_multiplier: 1

# API配置
api:
  cors_enabled: true
  cors_origins:
    - "*"
  cors_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  cors_headers:
    - "Content-Type"
    - "Authorization"
    - "X-Requested-With"
  rate_limit_enabled: false
  rate_limit_per_minute: 60

# 安全配置
security:
  password_min_length: 6
  password_max_length: 128
  username_min_length: 3
  username_max_length: 50
  session_timeout: 86400
  max_login_attempts: 5
  lockout_duration: 300

# 文件上传配置
upload:
  max_file_size: 10485760
  allowed_extensions:
    - ".yml"
    - ".yaml"
    - ".json"
  upload_dir: "var/uploads"

# 任务执行配置
execution:
  timeout: 3600
  max_output_size: 104857600
  temp_dir: "/tmp/wflow"
  cleanup_temp_files: true
  cleanup_interval: 3600

# 通知配置
notification:
  enabled: false
  email:
    enabled: false
    smtp_host: "smtp.example.com"
    smtp_port: 587
    smtp_user: "noreply@example.com"
    smtp_password: ""
    from_address: "noreply@example.com"
    from_name: "WFlow"
  webhook:
    enabled: false
    url: ""
    timeout: 10

# 监控配置
monitoring:
  enabled: false
  health_check_interval: 30
  metrics_enabled: false
  metrics_port: 9090

# 缓存配置
cache:
  enabled: true
  backend: "redis"
  default_ttl: 3600
  max_size: 10000
